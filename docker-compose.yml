version: "3.9"

services:
  backend:
    build: ./backend
    container_name: ddos-shield-backend
    env_file: .env
    environment:
      - SIMULATION_MODE=true
    ports:
      - "8000:8000"
    volumes:
      - db-data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: ddos-shield-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db-data:
